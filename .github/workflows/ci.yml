name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Rust SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Guard canonical naming
        run: node scripts/check-repository-policy.mjs

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features

      - name: Run conformance suite
        run: cargo run --locked --quiet --bin missionweaveprotocol-conformance

      - name: Package
        run: cargo package --locked

      - name: Verify installed CLI
        run: |
          cargo install --locked --path . --root "${RUNNER_TEMP}/missionweaveprotocol-rust"
          "${RUNNER_TEMP}/missionweaveprotocol-rust/bin/missionweaveprotocol-conformance"
